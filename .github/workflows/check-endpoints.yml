name: Check Community Endpoints

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-endpoints:
    name: Check community endpoints across all networks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check endpoints and remove broken ones
        run: node scripts/check-endpoints.mjs

      - name: Read summary and check for changes
        id: diff
        run: |
          if [ -f endpoint-check-summary.txt ]; then
            {
              echo "summary<<EOF"
              cat endpoint-check-summary.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            rm endpoint-check-summary.txt
          fi
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/remove-broken-endpoints
          delete-branch: true
          title: "fix: remove unreachable community endpoints"
          body: |
            ## Summary

            The weekly endpoint health check found unreachable community endpoints
            and removed them from the network documentation pages.

            ### Removed endpoints

            ${{ steps.diff.outputs.summary }}

            ---

            Detected by [automated endpoint check](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          labels: endpoint-check
          commit-message: "fix: remove unreachable community endpoints"
